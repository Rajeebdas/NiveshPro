# Render Blueprint — NiveshPro dashboard (Vite SPA in pnpm monorepo)
# Docs: https://render.com/docs/blueprint-spec
#
# In the Render dashboard, add build-time env for Vite (required for Supabase in production):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
# (Settings → Environment → Environment Variables)

services:
  - type: web
    name: niveshpro-dashboard
    runtime: static
    buildCommand: corepack enable && pnpm install && pnpm run build:dashboard
    staticPublishPath: ./artifacts/niveshpro/dist/public
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
